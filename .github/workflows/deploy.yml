name: Deploy Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy and Restart Server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            [ -f ~/.profile ] && . ~/.profile
            [ -f ~/.bash_profile ] && . ~/.bash_profile
            [ -f ~/.bashrc ] && . ~/.bashrc

            export PATH=$PATH:/root/.local/share/swiftly/bin:/usr/local/bin:/opt/swift/usr/bin:~/.local/bin:~/.swiftenv/bin:~/.swiftenv/shims

            if ! command -v swift &> /dev/null; then
              echo "❌ Error: Could not find 'swift'. Please verify it is installed on the VPS."
              echo "If installed, find its location by typing 'which swift' on the server and update the PATH in this workflow."
              exit 1
            fi

            cd ~/getOn/Server

            # Pull the latest code from the repository, regardless of conflicts
            git fetch origin main
            git reset --hard origin/main

            # Update dependencies and build the Vapor server code in release mode
            swift package update
            swift build -c release

            # Restart the Systemd service
            systemctl restart geton
            echo "Server successfully restarted!"
